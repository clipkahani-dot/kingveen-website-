<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; }
    img { max-width: 100%; max-height: 100%; object-fit: contain; }
</style>
</head>
<body>
    <img id="player" src="media/god/ezgif-frame-001.jpg" alt="Animated God Clip">
    <script>
        const totalFrames = 201;
        // Target: 8 seconds = 8000ms. 
        const frameTime = 8000 / totalFrames; 
        const player = document.getElementById('player');
        
        const images = [];
        for(let i = 1; i <= totalFrames; i++) {
            const img = new Image();
            const numStr = i.toString().padStart(3, '0');
            img.src = `media/god/ezgif-frame-${numStr}.jpg`;
            images.push(img);
        }

        let currentFrame = 1;
        setInterval(() => {
            currentFrame++;
            if(currentFrame > totalFrames) currentFrame = 1; 
            player.src = images[currentFrame - 1].src;
        }, frameTime);
    </script>
</body>
</html>
